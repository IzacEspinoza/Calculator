<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    
    <div id="calculator">

        <div id="display">
            <h1 id="result">0</h1>
        </div>

        <div id="keyboard">
            <!--Digits-->
            <div class="button" id="zero">0</div>
            <div class="button" id="one">1</div>
            <div class="button" id="two">2</div>
            <div class="button" id="three">3</div>
            <div class="button" id="four">4</div>
            <div class="button" id="five">5</div>
            <div class="button" id="six">6</div>
            <div class="button" id="seven">7</div>
            <div class="button" id="eight">8</div>
            <div class="button" id="nine">9</div>
            <!--operations-->
            <div class="button operator" id="posNeg">+/-</div>
            <div class="button operator" id="percentage">%</div>
            <div class="button operator" id="add">+</div>
            <div class="button operator" id="subtract">-</div>
            <div class="button operator" id="multiply">x</div>
            <div class="button operator" id="divide">/</div>
            <div class="button operator" id="equals">=</div>
            <div class="button operator" id="clear">AC</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
